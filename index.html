<head>

  <meta name="twitter:description" content="Rancang alur kerja & flowchart secara visual langsung di browser. Drag, sambung, ekspor PNG. Dari Datasiber Lab." />
  <meta name="twitter:image" content="https://board.datasiber.com/og-image.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }

    /* dotted grid canvas */
    #canvasArea {
      background-color: #1a1a1a;
      background-image: radial-gradient(circle, #333 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* node ports */
    .node-port {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 9999px;
      background: #1a1a1a;
      border: 2px solid #6b7280;
      cursor: crosshair;
      z-index: 5;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s, background 0.1s, border-color 0.1s, transform 0.1s;
    }
    .node:hover .node-port {
      opacity: 1;
      pointer-events: auto;
    }
    .node-port[data-side="left"] {
      left: -5px;
      top: 50%;
      transform: translateY(-50%);
    }
    .node-port[data-side="right"] {
      right: -5px;
      top: 50%;
      transform: translateY(-50%);
    }
    .node-port[data-side="top"] {
      top: -5px;
      left: 50%;
      transform: translateX(-50%);
    }
    .node-port[data-side="bottom"] {
      bottom: -5px;
      left: 50%;
      transform: translateX(-50%);
    }
    .node-port:hover {
      background: #4a90d9;
      border-color: #4a90d9;
      z-index: 7;
    }
    .node-port[data-side="left"]:hover,
    .node-port[data-side="right"]:hover {
      transform: translateY(-50%) scale(1.25);
    }
    .node-port[data-side="top"]:hover,
    .node-port[data-side="bottom"]:hover {
      transform: translateX(-50%) scale(1.25);
    }

    .icon-box {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      word-break: break-word;
    }

    /* hover toolbar above node */
    .node-toolbar {
      position: absolute;
      bottom: 100%;        /* sit flush on top of the node (no hover gap) */
      right: 0;
      padding-bottom: 6px; /* transparent bridge so hover stays continuous */
      display: flex;
      gap: 4px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.12s;
    }
    .node:hover .node-toolbar { opacity: 1; pointer-events: auto; }
    .node-toolbar button {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      background: #2b2b2b;
      border: 1px solid #3a3a3a;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .node-toolbar button:hover { background: #3a2323; border-color: #ef4444; }

    .node-resize-handle {
      position: absolute;
      right: 6px;
      bottom: 6px;
      width: 12px;
      height: 12px;
      border-right: 2px solid #6b7280;
      border-bottom: 2px solid #6b7280;
      border-radius: 0 0 8px 0;
      cursor: nwse-resize;
      opacity: 0;
      transition: opacity 0.12s, border-color 0.12s;
      z-index: 6;
    }
    .node:hover .node-resize-handle {
      opacity: 1;
    }
    .node-resize-handle:hover {
      border-color: #4a90d9;
    }

    /* shaped (flowchart) nodes: SVG outline behind the content */
    .node-shaped { background: transparent; }
    .node-shape {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
      z-index: 0;
      pointer-events: none;            /* clicks fall through to the node for drag */
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.35));
    }
    .node-shape-path {
      fill: #2b2b2b;
      stroke: #3a3a3a;
      stroke-width: 1.5;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;  /* even border regardless of node size */
      transition: stroke 0.1s;
    }
    .node-shape-line {
      fill: none;
      stroke: #3a3a3a;
      stroke-width: 1.5;
      vector-effect: non-scaling-stroke;
      transition: stroke 0.1s;
    }
    .node-shaped:hover .node-shape-path,
    .node-shaped:hover .node-shape-line { stroke: #4a90d9; }
    .node-body {
      position: relative;
      z-index: 1;
      box-sizing: border-box;
      overflow: hidden;
    }

    /* keep text clear of pointy/narrow corners */
    .node[data-shape="diamond"] .node-body,
    .node[data-shape="circle"] .node-body { padding-left: 24px; padding-right: 24px; }
    .node[data-shape="parallelogram"] .node-body { padding-left: 22px; }
    .node[data-shape="hexagon"] .node-body { padding-left: 18px; padding-right: 18px; }
    .node[data-shape="offpage"] .node-body { padding-bottom: 14px; }
    .node[data-shape="delay"] .node-body { padding-right: 22px; }

    /* mini shape preview inside the node picker */
    .picker-shape {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .picker-shape svg { width: 100%; height: 100%; overflow: visible; }

    /* edges */
    .edge-group { pointer-events: none; }
    .edge-hit { pointer-events: stroke; cursor: pointer; }
    .edge-line { pointer-events: none; transition: stroke 0.1s, stroke-width 0.1s; }
    .edge-group:hover .edge-line { stroke: #ef4444 !important; stroke-width: 3; }
    .edge-label { pointer-events: all; cursor: pointer; }
    .edge-group:hover .edge-label rect { stroke: #ef4444; }
    .edge-endpoint {
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s, fill 0.12s, stroke 0.12s, r 0.12s;
      cursor: crosshair;
    }
    .edge-group:hover .edge-endpoint {
      pointer-events: all;
      opacity: 1;
    }
    .edge-endpoint:hover {
      fill: #4a90d9;
      stroke: #9fc5ff;
    }

    .edge-menu {
      min-width: 120px;
      background: #202020;
      border: 1px solid #3a3a3a;
      border-radius: 10px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }
    .edge-menu button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 9px 12px;
      font-size: 12px;
      color: #e5e7eb;
      background: transparent;
    }
    .edge-menu button:hover {
      background: #2d2d2d;
    }

    /* side panels (own CSS instead of relying on Tailwind JIT toggle) */
    .side-panel { transform: translateX(100%); transition: transform 0.2s ease; }
    .side-panel.open { transform: translateX(0); }

    /* icon picker grid */
    .icon-pick {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      border-radius: 6px;
      background: #1a1a1a;
      border: 1px solid #2d2d2d;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    .icon-pick:hover { background: #2d2d2d; border-color: #4a90d9; }

    .assistant-fab {
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.24);
      background: #22d3ee;
      border: 1px solid rgba(8, 145, 178, 0.9);
    }
    .assistant-panel {
      display: flex;
      flex-direction: column;
      width: min(320px, calc(100vw - 1rem));
      height: calc(100% - 1rem);
      max-height: calc(100% - 1rem);
      background: #17191c;
      border: 1px solid #2d3339;
      border-radius: 14px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }
    .assistant-header {
      background: #17191c;
    }
    .assistant-body {
      flex: 1 1 auto;
      min-height: 0;
      background: #141618;
      overscroll-behavior: contain;
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }
    .assistant-body::-webkit-scrollbar {
      width: 8px;
    }
    .assistant-body::-webkit-scrollbar-track {
      background: transparent;
    }
    .assistant-body::-webkit-scrollbar-thumb {
      background: #2e343a;
      border-radius: 9999px;
      border: 1px solid transparent;
      background-clip: padding-box;
    }
    .assistant-msg-row {
      display: flex;
      gap: 7px;
      align-items: flex-start;
    }
    .assistant-msg-row.user {
      justify-content: flex-end;
    }
    .assistant-avatar {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex: 0 0 auto;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .assistant-avatar.assistant {
      background: #0f2f36;
      color: #9be7f1;
      border-color: rgba(34, 211, 238, 0.18);
    }
    .assistant-avatar.system {
      background: #24282d;
      color: #e5e7eb;
    }
    .assistant-msg-wrap {
      max-width: 90%;
      min-width: 0;
    }
    .assistant-msg-meta {
      margin-bottom: 3px;
      font-size: 9px;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #7d8792;
    }
    .assistant-msg {
      white-space: pre-wrap;
      word-break: break-word;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 11px;
      line-height: 1.5;
      user-select: text;
      border: 1px solid transparent;
    }
    .assistant-msg.user {
      background: #1f6f7b;
      color: #f7feff;
      border-color: #278b99;
      border-bottom-right-radius: 4px;
    }
    .assistant-msg.assistant {
      background: #1c2024;
      color: #e5e7eb;
      border-color: #2d3339;
      border-bottom-left-radius: 4px;
    }
    .assistant-msg.system {
      background: #18242c;
      color: #cbd5e1;
      border-color: #28414f;
    }
    .assistant-compose {
      flex: 0 0 auto;
      position: sticky;
      bottom: 0;
      z-index: 2;
      background: #17191c;
    }
    .assistant-compose-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .assistant-compose textarea,
    .assistant-compose input,
    .assistant-compose select {
      user-select: text;
    }
    .assistant-compose textarea {
      min-height: 0;
      max-height: 78px;
    }
    .image-chip {
      border: 1px solid #2d3339;
      background: #14181b;
    }
    .image-preview {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #2d3339;
      background: #111111;
    }
    .assistant-loading {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 16px;
    }
    .assistant-loading span {
      width: 6px;
      height: 6px;
      border-radius: 9999px;
      background: #67e8f9;
      opacity: 0.35;
      animation: assistantPulse 0.9s infinite ease-in-out;
    }
    .assistant-loading span:nth-child(2) { animation-delay: 0.12s; }
    .assistant-loading span:nth-child(3) { animation-delay: 0.24s; }
    .assistant-control {
      width: 100%;
      background: #121416;
      border: 1px solid #2d3339;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 11px;
      line-height: 1.35;
      color: #e5e7eb;
      transition: border-color 0.12s, background 0.12s;
    }
    .assistant-control:focus {
      outline: none;
      border-color: #22d3ee;
      background: #111315;
    }
    .assistant-btn {
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 11px;
      font-weight: 600;
      background: #22d3ee;
      color: #062131;
      border: 1px solid #0891b2;
      transition: background 0.12s, border-color 0.12s, opacity 0.12s;
    }
    .assistant-icon-btn {
      width: 36px;
      height: 36px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      font-size: 14px;
      line-height: 1;
    }
    .assistant-btn:hover {
      background: #5ee8f7;
    }
    .assistant-muted-btn {
      border-radius: 8px;
      padding: 6px 9px;
      font-size: 10px;
      color: #d1d5db;
      background: #1b1f23;
      border: 1px solid #2d3339;
      transition: background 0.12s, border-color 0.12s;
    }
    .assistant-muted-btn:hover {
      background: #23282d;
      border-color: #38414a;
    }
    .auth-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.2);
    }
    .login-panel {
      width: min(300px, calc(100vw - 1rem));
      background: #17191c;
      border: 1px solid #2d3339;
      border-radius: 14px;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
    }
    @keyframes assistantPulse {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.3; }
      40% { transform: translateY(-3px); opacity: 1; }
    }
  </style>
</head>
<body class="h-screen overflow-hidden flex flex-col bg-[#1a1a1a] text-gray-100">

  <!-- top bar -->
  <header class="h-12 flex items-center justify-between px-4 bg-[#202020] border-b border-[#2d2d2d] shrink-0 z-40">
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2">
        <div class="w-6 h-6 rounded-md bg-gradient-to-br from-cyan-400 to-blue-600 flex items-center justify-center text-[10px] font-bold tracking-tight">SB</div>
        <span class="text-sm font-semibold tracking-tight">SiberBoard</span>
      </div>
      <span class="text-gray-600">/</span>
      <input id="wfName" value="Untitled board"
        class="bg-transparent text-sm font-medium focus:outline-none focus:bg-[#2d2d2d] rounded px-2 py-1 w-44" />
      <span class="text-[11px] text-gray-500 border border-[#3a3a3a] rounded px-1.5 py-0.5">Draft</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="saveStatus" class="text-[11px] text-gray-500 min-w-[5rem] text-right">Not saved</span>
      <button id="clearBtn" class="text-xs px-3 py-1.5 rounded-md bg-[#2d2d2d] hover:bg-[#3a2323] hover:border-[#ef4444] border border-[#3a3a3a] font-medium" title="Clear canvas">Clear</button>
      <div class="relative">
        <button id="exportImgBtn" class="text-xs px-3 py-1.5 rounded-md bg-[#2d2d2d] hover:bg-[#3a3a3a] border border-[#3a3a3a] font-medium" title="Export workflow as PNG">Export PNG ▾</button>
        <div id="exportMenu" class="edge-menu absolute right-0 top-full mt-1 z-50 hidden">
          <button type="button" data-transparent="0">With background</button>
          <button type="button" data-transparent="1">Transparent</button>
        </div>
      </div>
      <button id="loadUiBtn" class="text-xs px-3 py-1.5 rounded-md bg-[#2d2d2d] hover:bg-[#3a3a3a] border border-[#3a3a3a] font-medium">Load</button>
      <button id="saveUiBtn" class="text-xs px-3 py-1.5 rounded-md bg-[#ea4b71] hover:bg-[#d63e63] font-medium">Save</button>
    </div>
  </header>

  <!-- canvas -->
  <main id="canvasArea" class="flex-1 relative overflow-hidden cursor-grab">
    <!-- transformed world layer: nodes + edges live here -->
    <div id="viewport" class="absolute top-0 left-0 w-full h-full origin-top-left">
      <svg id="edgeLayer" class="absolute top-0 left-0 overflow-visible pointer-events-none z-10" width="1" height="1"></svg>
    </div>

    <!-- add-node trigger -->
    <button id="addNodeBtn"
      class="ui-chrome absolute top-4 right-4 z-30 w-10 h-10 rounded-lg bg-[#ea4b71] hover:bg-[#d63e63] text-xl font-bold shadow-lg flex items-center justify-center">+</button>

    <!-- node picker panel -->
    <aside id="nodePanel"
      class="side-panel ui-chrome absolute top-0 right-0 h-full w-72 bg-[#202020] border-l border-[#2d2d2d] z-40 flex flex-col">
      <div class="flex items-center justify-between px-4 h-12 border-b border-[#2d2d2d] shrink-0">
        <h2 class="text-sm font-semibold">Add node</h2>
        <button id="closePanelBtn" class="w-7 h-7 rounded hover:bg-[#2d2d2d] text-gray-400">✕</button>
      </div>
      <div class="p-3 border-b border-[#2d2d2d] shrink-0">
        <input id="nodeSearch" type="text" placeholder="Search nodes…"
          class="w-full bg-[#1a1a1a] border border-[#3a3a3a] rounded-md px-3 py-2 text-sm placeholder-gray-500 focus:outline-none focus:border-[#4a90d9]" />
      </div>
      <div id="pickerList" class="p-2 flex flex-col gap-0.5 overflow-y-auto flex-1"></div>
    </aside>

    <!-- node editor panel -->
    <aside id="nodeEditor"
      class="side-panel ui-chrome absolute top-0 right-0 h-full w-72 bg-[#202020] border-l border-[#2d2d2d] z-40 flex flex-col">
      <div class="flex items-center justify-between px-4 h-12 border-b border-[#2d2d2d] shrink-0">
        <h2 class="text-sm font-semibold">Edit node</h2>
        <button id="closeEditorBtn" class="w-7 h-7 rounded hover:bg-[#2d2d2d] text-gray-400">✕</button>
      </div>
      <div class="p-4 flex flex-col gap-5 overflow-y-auto">
        <div>
          <label class="text-[11px] uppercase tracking-wider text-gray-500">Label</label>
          <input id="editLabel" type="text"
            class="mt-1.5 w-full bg-[#1a1a1a] border border-[#3a3a3a] rounded-md px-3 py-2 text-sm focus:outline-none focus:border-[#4a90d9]" />
        </div>
        <div>
          <label class="text-[11px] uppercase tracking-wider text-gray-500">Description</label>
          <input id="editSub" type="text"
            class="mt-1.5 w-full bg-[#1a1a1a] border border-[#3a3a3a] rounded-md px-3 py-2 text-sm focus:outline-none focus:border-[#4a90d9]" />
        </div>
        <div id="iconEditRow">
          <label class="text-[11px] uppercase tracking-wider text-gray-500">Icon</label>
          <div class="mt-1.5 flex items-center gap-2">
            <div id="editIconPreview" class="icon-box" style="background:#64748b22;"></div>
            <input id="editIconInput" type="text" maxlength="6" placeholder="Type / paste emoji"
              class="flex-1 bg-[#1a1a1a] border border-[#3a3a3a] rounded-md px-3 py-2 text-sm focus:outline-none focus:border-[#4a90d9]" />
          </div>
          <div id="iconGrid" class="mt-3 grid grid-cols-8 gap-1"></div>
        </div>
      </div>
    </aside>

    <!-- zoom controls -->
    <div class="ui-chrome absolute top-4 left-4 z-30 flex items-center gap-2">
      <div class="flex flex-col bg-[#202020] border border-[#2d2d2d] rounded-lg overflow-hidden">
        <button id="zoomIn" class="w-9 h-9 hover:bg-[#2d2d2d] text-lg leading-none">+</button>
        <div class="h-px bg-[#2d2d2d]"></div>
        <button id="zoomOut" class="w-9 h-9 hover:bg-[#2d2d2d] text-lg leading-none">−</button>
        <div class="h-px bg-[#2d2d2d]"></div>
        <button id="zoomFit" class="w-9 h-9 hover:bg-[#2d2d2d] text-sm" title="Reset view">⊡</button>
      </div>
      <span id="zoomLabel" class="text-xs text-gray-400 bg-[#202020] border border-[#2d2d2d] rounded px-2 py-1">100%</span>
    </div>

    <div id="edgeMenu" class="edge-menu ui-chrome absolute z-50 hidden">
      <button id="editEdgeBtn" type="button">Edit label</button>
      <button id="deleteEdgeBtn" type="button">Hapus</button>
    </div>

    <button id="aiAssistantBtn"
      class="assistant-fab ui-chrome absolute left-4 bottom-4 z-30 px-3 h-9 rounded-full text-[#062131] text-[11px] font-semibold flex items-center gap-1.5">
      <span>AI</span>
      <span>Assistant</span>
    </button>

    <section id="aiLoginPanel"
      class="login-panel ui-chrome absolute left-4 top-4 z-40 hidden"
      aria-hidden="true">
      <div class="px-3 h-11 border-b border-[#2d2d2d] flex items-center justify-between">
        <div>
          <div class="text-xs font-semibold">AI Login</div>
          <div class="text-[10px] text-gray-500">Akses assistant hanya untuk user login</div>
        </div>
        <button id="closeAiLoginBtn" class="w-7 h-7 rounded-md hover:bg-[#232323] text-gray-400 text-sm">✕</button>
      </div>
      <div class="p-3 flex flex-col gap-3">
        <label>
          <span class="block text-[10px] uppercase tracking-wider text-gray-500 mb-1">Username</span>
          <input id="aiLoginUsername" type="text"
            class="assistant-control" />
        </label>
        <label>
          <span class="block text-[10px] uppercase tracking-wider text-gray-500 mb-1">Password</span>
          <input id="aiLoginPassword" type="password"
            class="assistant-control" />
        </label>
        <div class="flex items-center justify-between gap-2">
          <div id="aiLoginStatus" class="text-[10px] text-gray-500">Masuk untuk memakai AI assistant.</div>
          <button id="aiLoginSubmitBtn"
            type="button"
            class="auth-btn assistant-btn">
            Login
          </button>
        </div>
      </div>
    </section>

    <section id="aiAssistantPanel"
      class="assistant-panel ui-chrome absolute left-4 top-4 z-40 hidden"
      aria-hidden="true">
      <div id="aiAssistantHeader" class="assistant-header px-3 h-10 border-b border-[#2d3339] flex items-center justify-between shrink-0">
        <div class="pointer-events-none">
          <div class="text-xs font-semibold">AI Assistant</div>
        </div>
        <div class="flex items-center gap-1.5">
          <button id="aiLogoutBtn" class="assistant-muted-btn">Logout</button>
          <button id="closeAiAssistantBtn" class="w-7 h-7 rounded-md hover:bg-[#232323] text-gray-400 text-sm">✕</button>
        </div>
      </div>

      <div class="px-3 py-2 border-b border-[#2d3339] grid grid-cols-2 gap-2 shrink-0">
        <label class="col-span-1">
          <span class="block text-[10px] uppercase tracking-wider text-gray-500 mb-1">Provider</span>
          <select id="aiProvider"
            class="assistant-control">
            <option value="deepseek">DeepSeek</option>
            <option value="openai">OpenAI</option>
            <option value="grok">Grok</option>
          </select>
        </label>
        <label class="col-span-1">
          <span class="block text-[10px] uppercase tracking-wider text-gray-500 mb-1">Model</span>
          <input id="aiModel" type="text" value="deepseek-chat"
            class="assistant-control" />
        </label>
      </div>

      <div id="aiImageRow" class="px-3 py-2 border-b border-[#2d3339] shrink-0 hidden">
        <div class="flex items-center justify-between gap-2">
          <div class="min-w-0">
            <div class="text-[10px] uppercase tracking-wider text-gray-500">Gambar</div>
          </div>
          <div class="flex items-center gap-1.5">
            <input id="aiImageInput" type="file" accept="image/png,image/jpeg" class="hidden" />
            <button id="aiImageSelectBtn" type="button" class="assistant-muted-btn">Upload</button>
            <button id="aiImageClearBtn" type="button" class="assistant-muted-btn hidden">Hapus</button>
          </div>
        </div>
        <div id="aiImageProviderHint" class="mt-1 text-[10px] text-gray-500">Khusus OpenAI dan Grok.</div>
        <div id="aiImagePreviewWrap" class="image-chip mt-2 rounded-lg px-2 py-2 hidden">
          <div class="flex items-center gap-2">
            <img id="aiImagePreview" class="image-preview" alt="Preview image context" />
            <div class="min-w-0">
              <div id="aiImageName" class="text-[10px] text-gray-200 truncate"></div>
              <div id="aiImageHint" class="text-[10px] text-gray-500">Gambar ini akan tetap dipakai sampai diganti atau dihapus.</div>
            </div>
          </div>
        </div>
      </div>

      <div id="aiMessages" class="assistant-body flex-1 min-h-0 overflow-y-auto px-3 py-3 flex flex-col gap-2"></div>

      <div class="assistant-compose p-3 border-t border-[#2d3339] shrink-0">
        <div class="assistant-compose-row">
          <textarea id="aiPrompt" rows="2"
            class="assistant-control w-full resize-none"
            placeholder="Tulis instruksi singkat..."></textarea>
          <button id="sendAiPromptBtn"
            class="assistant-btn assistant-icon-btn"
            type="button"
            aria-label="Kirim prompt">
            <span aria-hidden="true">➤</span>
          </button>
        </div>
      </div>
    </section>

    <input id="loadUiInput" type="file" accept=".json,application/json" class="hidden" />
  </main>

  <script type="module" src="src/main.js?v=21"></script>
</body>
</html>
