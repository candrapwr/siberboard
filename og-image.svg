<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Source for the social-share image. Export to og-image.png (1200x630). -->
  <defs>
    <linearGradient id="logo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#2a2a2a"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#1a1a1a"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- decorative mini flowchart -->
  <g transform="translate(770, 250)" fill="none" stroke="#3a3a3a" stroke-width="2">
    <rect x="0" y="40" width="120" height="44" rx="22" fill="#2b2b2b"/>
    <path d="M150 62 H210" stroke="#7a7a7a"/>
    <polygon points="270,62 320,30 370,62 320,94" fill="#2b2b2b"/>
    <path d="M320,110 V150 H150 V160" stroke="#7a7a7a"/>
    <rect x="90" y="160" width="120" height="44" rx="8" fill="#2b2b2b"/>
  </g>

  <!-- brand lockup -->
  <g transform="translate(110, 250)">
    <rect width="84" height="84" rx="20" fill="url(#logo)"/>
    <text x="42" y="58" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#ffffff" text-anchor="middle">SB</text>
  </g>

  <text x="214" y="290" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="700" fill="#f3f4f6">SiberBoard</text>
  <text x="216" y="340" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#9ca3af">Visual Flow &amp; Flowchart Builder</text>
  <text x="216" y="392" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#06b6d4" font-weight="600">datasiber.com</text>
</svg>
